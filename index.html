<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Radar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Campus Radar</h1>
            <div class="datetime-badge" id="datetime-display">Yükleniyor...</div>
        </header>

        <div class="dashboard">
            <div class="status-column">
                <div class="column-header">
                    <div class="dot online-dot"></div>
                    <h2>Şu An Okulda</h2>
                </div>
                <div id="at-school-list" class="card-grid"></div>
            </div>

            <div class="status-column mt-gap">
                <div class="column-header">
                    <div class="dot offline-dot"></div>
                    <h2>Okulda Olmayanlar</h2>
                </div>
                <div id="not-at-school-list" class="card-grid"></div>
            </div>
        </div>

        <footer>
            <p>Designed & Coded with 💻 by <span class="brand">zodia3x</span></p>
        </footer>
    </div>

    <div id="schedule-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-modal" class="close-btn">&times;</button>
            <div class="modal-header">
                <h2 id="modal-name">İsim Soyisim</h2>
                <p>Haftalık Ders Programı</p>
            </div>
            <div id="modal-schedule-list" class="schedule-container">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
